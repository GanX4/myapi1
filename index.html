<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart IoT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f111a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.1);
            
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ═══════════════════════════════════════════════════════════
           AMBIENT MESH BACKGROUND
           ═══════════════════════════════════════════════════════════ */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-base);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--accent-primary);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-blue);
            bottom: -10%;
            right: -5%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: var(--accent-secondary);
            top: 40%;
            left: 60%;
            animation-delay: -10s;
            opacity: 0.3;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, 50px) scale(0.9); }
        }

        /* ═══════════════════════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════════════════════ */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        /* ═══════════════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════════════ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--glass-highlight);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* ═══════════════════════════════════════════════════════════
           SECTION TITLES
           ═══════════════════════════════════════════════════════════ */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
            margin-left: 16px;
        }

        /* ═══════════════════════════════════════════════════════════
           DEVICE CARDS
           ═══════════════════════════════════════════════════════════ */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .device-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .device-card:hover {
            transform: translateY(-4px);
        }

        .device-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--glass-border);
            transition: background 0.4s;
        }

        .device-card.on::before {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-primary));
        }
        .device-card.on {
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .device-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.4s;
        }

        .device-card.on .device-icon {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .status-badge.on {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .status-badge.off {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .device-info h3 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        /* ═══════════════════════════════════════════════════════════
           TOASTS
           ═══════════════════════════════════════════════════════════ */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: #1e293b;
            color: #fff;
            padding: 16px 24px;
            border-radius: var(--radius-sm);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid var(--accent-blue);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--accent-green); }
        .toast.error { border-color: var(--accent-red); }

    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastBox"></div>

    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div>
                <h1 class="header-title">Nexus Control</h1>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="fetchData()">
                    <span style="font-size: 1.2rem;">↻</span> Sync
                </button>
            </div>
        </header>

        <!-- LEDs -->
        <div>
            <div class="section-title">
                Control Panel
            </div>
            <div class="grid-container" id="ledGrid">
                <!-- Data injected here -->
                <div style="color: var(--text-muted); grid-column: 1/-1; padding: 20px 0;">Loading devices...</div>
            </div>
        </div>

        <!-- Sensors -->
        <div>
            <div class="section-title">
                Environment Monitors
            </div>
            <div class="grid-container" id="sensorGrid">
                <!-- Data injected here -->
            </div>
        </div>
    </div>

    <script>
        // ใช้ Proxy บน Vercel เพื่อแก้ปัญหา Mixed Content (HTTPS -> HTTP)
        const API_URL = (window.location.protocol === 'https:') ? '/api/proxy' : 'http://tc.sbtc-mng.com/api.php';
        let devices = [];

        // Toast
        function showToast(msg, type = 'success') {
            const box = document.getElementById('toastBox');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '✓' : '⚠';
            toast.innerHTML = `<span style="font-size:1.2rem">${icon}</span> ${msg}`;
            box.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Fetch Data (Read-only)
        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if(data.success) {
                    devices = data.data;
                    renderData();
                } else {
                    showToast('Failed to load data', 'error');
                }
            } catch(e) {
                showToast('Connection error', 'error');
            }
        }

        function renderData() {
            const leds = devices.filter(d => d.device_type === 'LED');
            const sensors = devices.filter(d => d.device_type === 'SENSOR');

            // Render LEDs (Read-only)
            const ledGrid = document.getElementById('ledGrid');
            if(leds.length === 0) {
                ledGrid.innerHTML = '<div style="color:var(--text-muted); grid-column:1/-1;">No devices found.</div>';
            } else {
                ledGrid.innerHTML = leds.map(d => {
                    const isOn = (d.status === 'ON');
                    return `
                        <div class="device-card ${isOn ? 'on' : ''}">
                            <div class="device-header">
                                <div class="device-icon">
                                    ${isOn ? '💡' : '🔌'}
                                </div>
                                <span class="status-badge ${isOn ? 'on' : 'off'}">${d.status}</span>
                            </div>
                            <div class="device-info">
                                <h3>${d.device_name}</h3>
                                <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;">
                                    PIN: ${d.pin}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Render Sensors (Read-only)
            const sensorGrid = document.getElementById('sensorGrid');

            if(sensors.length === 0) {
                sensorGrid.innerHTML = '<div style="color:var(--text-muted); grid-column:1/-1;">No sensors found.</div>';
            } else {
                sensorGrid.innerHTML = sensors.map(s => {
                    const isTemp = s.device_name.toLowerCase().includes('temp');
                    const isHumid = s.device_name.toLowerCase().includes('humid');
                    
                    let icon = '🌡️';
                    if(isHumid) icon = '💧';
                    else if(s.device_name.toLowerCase().includes('soil')) icon = '🌱';

                    const isActive = (s.status === 'ACTIVE');

                    return `
                        <div class="device-card ${isActive ? 'on' : ''}">
                            <div class="device-header">
                                <div class="device-icon">
                                    ${icon}
                                </div>
                                <span class="status-badge ${isActive ? 'on' : 'off'}">${s.status}</span>
                            </div>
                            <div class="device-info">
                                <h3>${s.device_name}</h3>
                                <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;">
                                    PIN: ${s.pin}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
            setInterval(fetchData, 10000); // Auto-refresh data every 10 seconds
        });
    </script>
</body>
</html>
