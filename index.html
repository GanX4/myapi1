<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart IoT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f111a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.1);
            
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --text-sub: #64748b;
            
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ═══════════════════════════════════════════════════════════
           AMBIENT MESH BACKGROUND
           ═══════════════════════════════════════════════════════════ */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-base);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--accent-primary);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-blue);
            bottom: -10%;
            right: -5%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: var(--accent-secondary);
            top: 40%;
            left: 60%;
            animation-delay: -10s;
            opacity: 0.3;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, 50px) scale(0.9); }
        }

        /* ═══════════════════════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════════════════════ */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        /* ═══════════════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════════════ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--glass-highlight);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-blue));
            border: none;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
        }

        /* ═══════════════════════════════════════════════════════════
           SECTION TITLES
           ═══════════════════════════════════════════════════════════ */
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
            margin-left: 16px;
        }

        /* ═══════════════════════════════════════════════════════════
           DEVICE CARDS (LED)
           ═══════════════════════════════════════════════════════════ */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .device-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .device-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .device-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--glass-border);
            transition: background 0.4s;
        }

        .device-card.on::before {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-primary));
        }
        .device-card.on {
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .device-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.4s;
        }

        .device-card.on .device-icon {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        /* Modern Toggle */
        .toggle {
            position: relative;
            display: inline-block;
            width: 56px;
            height: 32px;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid var(--glass-border);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-muted);
            transition: .4s cubic-bezier(0.4, 0.0, 0.2, 1);
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: #fff;
        }

        .device-info h3 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        /* ═══════════════════════════════════════════════════════════
           SENSOR CARDS
           ═══════════════════════════════════════════════════════════ */
        .sensor-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s;
            cursor: pointer;
        }

        .sensor-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-4px);
        }

        .sensor-header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }

        .sensor-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .sensor-gauge {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sensor-gauge svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            position: absolute;
        }

        .sensor-gauge circle.bg {
            fill: none;
            stroke: rgba(255,255,255,0.05);
            stroke-width: 12;
        }

        .sensor-gauge circle.progress {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease-in-out;
        }

        .temp-color { stroke: var(--accent-secondary); filter: drop-shadow(0 0 8px rgba(236, 72, 153, 0.4)); }
        .humid-color { stroke: var(--accent-blue); filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.4)); }
        .soil-color { stroke: var(--accent-green); filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4)); }

        .sensor-value-wrap {
            text-align: center;
            z-index: 1;
        }

        .sensor-value {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
        }

        .sensor-unit {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ═══════════════════════════════════════════════════════════
           MODALS
           ═══════════════════════════════════════════════════════════ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .modal-header h2 {
            font-size: 1.5rem;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .btn-close:hover { color: #fff; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--accent-blue);
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: none;
        }
        .btn-danger:hover {
            background: var(--accent-red);
            color: #fff;
        }

        /* ═══════════════════════════════════════════════════════════
           TOASTS
           ═══════════════════════════════════════════════════════════ */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: #1e293b;
            color: #fff;
            padding: 16px 24px;
            border-radius: var(--radius-sm);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid var(--accent-blue);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--accent-green); }
        .toast.error { border-color: var(--accent-red); }

    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastBox"></div>

    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div>
                <h1 class="header-title">Nexus Control</h1>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="fetchData()">
                    <span style="font-size: 1.2rem;">↻</span> Sync
                </button>
                <button class="btn btn-primary" onclick="openModal('addModal')">
                    + Add Device
                </button>
            </div>
        </header>

        <!-- LEDs -->
        <div>
            <div class="section-title">
                Control Panel
            </div>
            <div class="grid-container" id="ledGrid">
                <!-- Data injected here -->
                <div style="color: var(--text-muted); grid-column: 1/-1; padding: 20px 0;">Loading devices...</div>
            </div>
        </div>

        <!-- Sensors -->
        <div>
            <div class="section-title">
                Environment Monitors
            </div>
            <div class="grid-container" id="sensorGrid">
                <!-- Data injected here -->
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <!-- Add Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Device</h2>
                <button class="btn-close" onclick="closeModal('addModal')">✕</button>
            </div>
            <form onsubmit="submitAdd(event)">
                <div class="form-group">
                    <label>Device Name</label>
                    <input type="text" class="form-control" id="addName" placeholder="e.g. Living Room Light" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select class="form-control" id="addType">
                        <option value="LED">Control (LED/Relay)</option>
                        <option value="SENSOR">Telemetry (Sensor)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pin / Port</label>
                    <input type="text" class="form-control" id="addPin" placeholder="e.g. 13" required>
                </div>
                <div class="form-group">
                    <label>Initial Status</label>
                    <select class="form-control" id="addStatus">
                        <option value="OFF">OFF</option>
                        <option value="ON">ON</option>
                        <option value="ACTIVE">ACTIVE</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('addModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Device</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Device</h2>
                <button class="btn-close" onclick="closeModal('editModal')">✕</button>
            </div>
            <form onsubmit="submitEdit(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Device Name</label>
                    <input type="text" class="form-control" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select class="form-control" id="editType">
                        <option value="LED">Control (LED/Relay)</option>
                        <option value="SENSOR">Telemetry (Sensor)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pin / Port</label>
                    <input type="text" class="form-control" id="editPin" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" onclick="deleteDevice()" style="margin-right:auto;">Delete</button>
                    <button type="button" class="btn" onclick="closeModal('editModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = (window.location.protocol === 'https:') ? '/api/proxy' : 'http://tc.sbtc-mng.com/api.php';
        let devices = [];
        let sensorIntervals = {};

        // Toast
        function showToast(msg, type = 'success') {
            const box = document.getElementById('toastBox');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '✓' : '⚠';
            toast.innerHTML = `<span style="font-size:1.2rem">${icon}</span> ${msg}`;
            box.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Fetch
        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if(data.success) {
                    devices = data.data;
                    renderData();
                } else {
                    showToast('Failed to load data', 'error');
                }
            } catch(e) {
                showToast('Connection error', 'error');
            }
        }

        function renderData() {
            const leds = devices.filter(d => d.device_type === 'LED');
            const sensors = devices.filter(d => d.device_type === 'SENSOR');

            // LEDs
            const ledGrid = document.getElementById('ledGrid');
            if(leds.length === 0) {
                ledGrid.innerHTML = '<div style="color:var(--text-muted); grid-column:1/-1;">No devices found.</div>';
            } else {
                ledGrid.innerHTML = leds.map(d => {
                    const isOn = d.status === 'ON';
                    return `
                        <div class="device-card ${isOn ? 'on' : ''}" ondblclick="openEdit('${d.id}')">
                            <div class="device-header">
                                <div class="device-icon">
                                    ${isOn ? '💡' : '🔌'}
                                </div>
                                <label class="toggle" onclick="event.stopPropagation()">
                                    <input type="checkbox" ${isOn ? 'checked' : ''} onchange="toggleDevice('${d.id}', this.checked)">
                                    <span class="slider"></span>
                                </label>
                            </div>
                            <div class="device-info">
                                <h3>${d.device_name}</h3>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Sensors
            const sensorGrid = document.getElementById('sensorGrid');
            Object.values(sensorIntervals).forEach(clearInterval);
            sensorIntervals = {};

            if(sensors.length === 0) {
                sensorGrid.innerHTML = '<div style="color:var(--text-muted); grid-column:1/-1;">No sensors found.</div>';
            } else {
                sensorGrid.innerHTML = sensors.map(s => {
                    const isTemp = s.device_name.toLowerCase().includes('temp');
                    const isHumid = s.device_name.toLowerCase().includes('humid');
                    
                    let strokeColor = 'soil-color';
                    let unit = '%';
                    let initVal = 50;
                    
                    if(isTemp) { strokeColor = 'temp-color'; unit = '°C'; initVal = 25; }
                    else if(isHumid) { strokeColor = 'humid-color'; unit = '%RH'; initVal = 60; }

                    const circ = 2 * Math.PI * 54;
                    const offset = circ - (circ * (initVal/100));

                    return `
                        <div class="sensor-card" ondblclick="openEdit('${s.id}')">
                            <div class="sensor-header">
                                <span class="sensor-title">${s.device_name}</span>
                            </div>
                            <div class="sensor-gauge">
                                <svg viewBox="0 0 120 120">
                                    <circle class="bg" cx="60" cy="60" r="54"></circle>
                                    <circle class="progress ${strokeColor}" cx="60" cy="60" r="54" 
                                            id="s-ring-${s.id}"
                                            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"></circle>
                                </svg>
                                <div class="sensor-value-wrap">
                                    <div class="sensor-value" id="s-val-${s.id}">${initVal}</div>
                                    <div class="sensor-unit">${unit}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Sim
                sensors.forEach(s => {
                    const isTemp = s.device_name.toLowerCase().includes('temp');
                    const circ = 2 * Math.PI * 54;
                    sensorIntervals[s.id] = setInterval(() => {
                        const valEl = document.getElementById(`s-val-${s.id}`);
                        const ringEl = document.getElementById(`s-ring-${s.id}`);
                        if(!valEl) return;
                        
                        let val = parseFloat(valEl.innerText);
                        val += (Math.random() - 0.5) * 3;
                        
                        if(isTemp) val = Math.max(15, Math.min(45, val));
                        else val = Math.max(10, Math.min(90, val));

                        valEl.innerText = Math.floor(val);
                        
                        const pct = isTemp ? (val/50) : (val/100);
                        ringEl.style.strokeDashoffset = circ - (circ * pct);
                    }, 3000 + Math.random()*2000);
                });
            }
        }

        // Actions
        async function toggleDevice(id, checked) {
            const status = checked ? 'ON' : 'OFF';
            try {
                const fd = new FormData();
                fd.append('action', 'update_status');
                fd.append('id', id);
                fd.append('status', status);
                const res = await fetch(API_URL, {method:'POST', body:fd});
                const json = await res.json();
                if(json.success) fetchData();
                else showToast('Update failed', 'error');
            } catch(e) { showToast('Network error', 'error'); }
        }

        // Modals
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        async function submitAdd(e) {
            e.preventDefault();
            try {
                const fd = new FormData();
                fd.append('action', 'add');
                fd.append('device_name', document.getElementById('addName').value);
                fd.append('device_type', document.getElementById('addType').value);
                fd.append('pin', document.getElementById('addPin').value);
                fd.append('status', document.getElementById('addStatus').value);
                
                const res = await fetch(API_URL, {method:'POST', body:fd});
                const json = await res.json();
                if(json.success) {
                    showToast('Device added successfully');
                    closeModal('addModal');
                    e.target.reset();
                    fetchData();
                } else showToast('Failed to add', 'error');
            } catch(err) { showToast('Error', 'error'); }
        }

        function openEdit(id) {
            const d = devices.find(x => x.id == id);
            if(!d) return;
            document.getElementById('editId').value = d.id;
            document.getElementById('editName').value = d.device_name;
            document.getElementById('editType').value = d.device_type;
            document.getElementById('editPin').value = d.pin;
            openModal('editModal');
        }

        async function submitEdit(e) {
            e.preventDefault();
            try {
                const fd = new FormData();
                fd.append('action', 'update');
                fd.append('id', document.getElementById('editId').value);
                fd.append('device_name', document.getElementById('editName').value);
                fd.append('device_type', document.getElementById('editType').value);
                fd.append('pin', document.getElementById('editPin').value);
                
                const res = await fetch(API_URL, {method:'POST', body:fd});
                const json = await res.json();
                if(json.success) {
                    showToast('Device updated');
                    closeModal('editModal');
                    fetchData();
                } else showToast('Update failed', 'error');
            } catch(err) { showToast('Error', 'error'); }
        }

        async function deleteDevice() {
            if(!confirm('Are you sure you want to delete this device?')) return;
            try {
                const fd = new FormData();
                fd.append('action', 'delete');
                fd.append('id', document.getElementById('editId').value);
                const res = await fetch(API_URL, {method:'POST', body:fd});
                const json = await res.json();
                if(json.success) {
                    showToast('Device deleted');
                    closeModal('editModal');
                    fetchData();
                } else showToast('Delete failed', 'error');
            } catch(err) { showToast('Error', 'error'); }
        }

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
            setInterval(fetchData, 10000);
        });
    </script>
</body>
</html>
